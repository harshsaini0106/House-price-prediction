<!DOCTYPE html>
<html>
<head>
<title>House Price Predictor</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>AI House Price Prediction</h1>

<form action="/predict" method="post">

<input type="number" name="sqfootage" placeholder="Square Footage" required>

<input type="number" name="bedroom" placeholder="Bedrooms" required>

<input type="number" name="bathroom" placeholder="Bathrooms" required>

<select name="location">
<option value="city">City</option>
<option value="suburb">Suburb</option>
<option value="rural">Rural</option>
</select>

<button type="submit">Predict Price</button>

</form>

<h2>{{ prediction_text }}</h2>

</div>

</body>
</html>
